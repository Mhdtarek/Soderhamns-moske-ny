name: soderhamns_moske_app
description: "Söderhamns Moské - Prayer times, news, and community app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # Navigation
  go_router: ^14.8.1
  
  # Network
  dio: ^5.7.0
  
  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.5
  
  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  
  # Utilities
  intl: ^0.20.2
  hijri: ^3.0.0
  connectivity_plus: ^6.1.4
  url_launcher: ^6.3.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_markdown: ^0.7.7+1
  share_plus: ^10.1.4
  logging: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.3
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
  
  assets:
    - assets/prayer_times/
    - assets/ayah/
